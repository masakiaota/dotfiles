<div id="satechi-left-keymap" role="group" aria-label="Satechi 左手デバイスの現在のキーマップ">
  <style>
    #satechi-left-keymap { width: 100%; }
    #satechi-left-keymap .keymap-legend { display: flex; flex-wrap: wrap; gap: 0.75rem 1rem; margin: 0 0 0.75rem; color: var(--muted-foreground); }
    #satechi-left-keymap .keymap-legend span { display: inline-flex; align-items: center; gap: 0.35rem; }
    #satechi-left-keymap .swatch { width: 0.75rem; height: 0.75rem; border-radius: 999px; border: 1px solid var(--border); }
    #satechi-left-keymap .swatch-app { background: var(--primary); }
    #satechi-left-keymap .swatch-window { background: var(--viz-series-2); }
    #satechi-left-keymap .swatch-system { background: var(--viz-series-3); }
    #satechi-left-keymap .swatch-unset { background: var(--muted); }
    #satechi-left-keymap svg { display: block; width: 100%; height: auto; }
    #satechi-left-keymap .key { fill: var(--card); stroke: var(--border); stroke-width: 1.5; }
    #satechi-left-keymap .app { fill: var(--primary); fill-opacity: 0.16; stroke: var(--primary); }
    #satechi-left-keymap .window { fill: var(--viz-series-2); fill-opacity: 0.16; stroke: var(--viz-series-2); }
    #satechi-left-keymap .system { fill: var(--viz-series-3); fill-opacity: 0.16; stroke: var(--viz-series-3); }
    #satechi-left-keymap .unset { fill: var(--muted); fill-opacity: 0.12; }
    #satechi-left-keymap .physical { fill: var(--foreground); font-size: 16px; font-weight: 500; text-anchor: middle; }
    #satechi-left-keymap .action { fill: var(--foreground); font-size: 12px; text-anchor: middle; }
    #satechi-left-keymap .unset-text { fill: var(--muted-foreground); font-size: 10px; text-anchor: middle; }
    #satechi-left-keymap .section-label { fill: var(--muted-foreground); font-size: 12px; font-weight: 500; letter-spacing: 0.05em; }
    #satechi-left-keymap .icon-line { fill: none; stroke: var(--foreground); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    #satechi-left-keymap .icon-fill { fill: var(--foreground); }
    #satechi-left-keymap .brand-icon { pointer-events: none; }
  </style>
